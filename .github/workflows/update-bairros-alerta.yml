# STANDBY — alerta por bairro pausado até curadoria dos dados de 2024.
# Código em automation/fetch_bairros_alerta.py e automation/bairros.seed.json
# Para reativar: restaure o cron, remova `if: false` e recoloque a seção na home.

name: Atualizar alerta por bairro

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-bairros-alerta
  cancel-in-progress: false

jobs:
  update-bairros-alerta:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Workflow em standby."
